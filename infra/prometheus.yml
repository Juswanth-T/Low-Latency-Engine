global:
  scrape_interval: 1s          # Fast scraping for real-time monitoring
  evaluation_interval: 1s      # Evaluate alerts every second

# C++ Engine monitoring alerts
rule_files:
  - "/etc/prometheus/prometheus_rules.yml"

scrape_configs:
  - job_name: 'rapidfeed_cpp_engine'
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          environment: 'development'
          component: 'cpp_engine'

